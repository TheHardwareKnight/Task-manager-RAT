<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Device Manager</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 900px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

/* Card */
.card {
    background: #1e293b;
    border-radius: 15px;
    padding: 18px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* Empty card */
.empty {
    background: transparent;
    border: 2px dashed rgba(255,255,255,0.2);
}

/* Text */
.device-name {
    font-weight: bold;
    font-size: 15px;
}

.process-count {
    font-size: 13px;
    opacity: 0.8;
}

.actions {
    display: flex;
    justify-content: space-between;
    gap: 10px; /* <-- adds space between buttons */
}

/* Buttons */
button {
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    color: white;
}

.end-btn {
    background: #ef4444;
}

.monitor-btn {
    background: #3b82f6;
}

/* Empty button outlines */
.outline-btn {
    background: transparent;
    border: 2px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.3);
}

/* Scribble placeholders */
.placeholder {
    height: 10px;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    margin-bottom: 6px;
}

.placeholder.short {
    width: 60%;
}

.placeholder.long {
    width: 80%;
}
</style>
</head>

<body>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<script>
const MAX_CARDS = 9;

// Replace this later with real backend data
const devices = []; // empty on purpose

const grid = document.getElementById("grid");

for (let i = 0; i < MAX_CARDS; i++) {
    const card = document.createElement("div");

    if (devices[i]) {
        const device = devices[i];
        card.className = "card";

        card.innerHTML = `
            <div>
                <div class="device-name">${device.name}</div>
                <div class="process-count">Processes: ${device.processes}</div>
            </div>
            <div class="actions">
                <button class="monitor-btn">Monitor</button>
                <button class="end-btn">End Task</button>
            </div>
        `;
    } else {
        card.className = "card empty";

        card.innerHTML = `
            <div>
                <div class="placeholder long"></div>
                <div class="placeholder short"></div>
            </div>
            <div class="actions">
                <button class="outline-btn">Monitor</button>
                <button class="outline-btn">End Task</button>
            </div>
        `;
    }

    grid.appendChild(card);
}
</script>

</body>
</html>
